# RFID test — kart ID konsolda, PLC kapali
plc.enabled=false
rfid.scan.lookup-only=true
spring.application.name=demo-rfid-test
# Ana uygulama 8080 kullaniyorsa cakismasin
server.port=8081

rfid.console.print=true

# Kart 169.254.179.2 -> PC :2000 (TCP istemci modu)
rfid.tcp.listen-enabled=true
rfid.tcp.listen-port=2000
# Kart TCP istemci modunda PC:2000'e baglanir; giden baglanti kapali tutulur
rfid.tcp.unit-connect-enabled=false
rfid.tcp.unit-targets=169.254.179.2:1000
rfid.tcp.reconnect-delay-ms=5000
rfid.tcp.connect-timeout-ms=8000
rfid.tcp.unit-device-ids=169.254.179.2=1

app.jwt.secret=test-jwt-secret-at-least-32-characters-long
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=admin

logging.pattern.console=%d{HH:mm:ss.SSS} %clr(%-5level){} %msg%n
logging.level.com.ticket.backend.rfid=INFO
