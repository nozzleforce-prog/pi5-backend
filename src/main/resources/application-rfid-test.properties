# RFID test — kart ID konsolda, PLC kapali
plc.enabled=false
spring.application.name=demo-rfid-test
# Ana uygulama 8080 kullaniyorsa cakismasin
server.port=8081

rfid.console.print=true

# Kart 192.168.1.100 veya 192.168.2.100 -> PC :2000 VEYA PC -> kart :1000
rfid.tcp.listen-enabled=true
rfid.tcp.listen-port=2000
rfid.tcp.unit-connect-enabled=true
rfid.tcp.unit-targets=192.168.1.100:1000,192.168.2.100:1000
rfid.tcp.reconnect-delay-ms=5000
rfid.tcp.connect-timeout-ms=8000
rfid.tcp.unit-device-ids=192.168.1.100=1,192.168.2.100=1

logging.pattern.console=%d{HH:mm:ss.SSS} %clr(%-5level){} %msg%n
logging.level.com.ticket.backend.rfid=INFO
