spring.application.name=demo
app.allowed.origin=${APP_ALLOWED_ORIGIN:http://localhost:3000}

plc.enabled=false
plc.ip=192.168.1.5
plc.port=502
plc.unitId=1
plc.mode-register=42001
plc.state-register=42002
plc.state-started-bit-value=1
plc.machine-start-timeout-ms=30000
plc.state-poll-interval-ms=200

# Eszamanli RP2350 (en az 8); TCP backlog + oturum thread havuzu
rfid.max-connections=16
rfid.max-sessions=16

# RFID uc birim TCP (test) — coklu baglanti
# Kart TCP istemci modundaysa backend dinler; TCP sunucu modundaysa unit-targets ile baglanir
rfid.console.print=true
rfid.tcp.listen-enabled=true
rfid.tcp.listen-port=2000
rfid.tcp.unit-connect-enabled=true
rfid.tcp.unit-targets=192.168.1.100:1000,192.168.2.100:1000
rfid.tcp.reconnect-delay-ms=5000
rfid.tcp.connect-timeout-ms=8000
rfid.tcp.unit-device-ids=192.168.1.100=1,192.168.2.100=1

# RFID cihaz ag taramasi (CH9120 TCP :1000)
device.scan.subnets=192.168.1,192.168.2
device.scan.port=1000
device.scan.timeout-ms=250