spring.application.name=demo
app.allowed.origin=${APP_ALLOWED_ORIGIN:http://localhost:3000}

spring.config.import=optional:classpath:site-config.yml

# Tam akis: RFID + PLC mode/state (GMT: modBilgisi/durumBilgisi) + bilet dusumu
rfid.scan.lookup-only=false

plc.enabled=true
plc.ip=169.254.179.226
plc.port=502
plc.unitId=1
# GMT Suite holding registers: modBilgisi=40001, durumBilgisi=40002, alarmDurumu=40003
plc.mode-register=40001
plc.state-register=40003
plc.time-register=40002
plc.state-started-bit-value=1
plc.machine-start-timeout-ms=5000
plc.scan-resume-delay-ms=5000
plc.state-poll-interval-ms=200

# Eszamanli RP2350 (en az 8); TCP backlog + oturum thread havuzu
rfid.max-connections=16
rfid.max-sessions=16

# RFID uc birim TCP (test) — coklu baglanti
# Kart TCP istemci modundaysa backend dinler; TCP sunucu modundaysa unit-targets ile baglanir
rfid.console.print=true
rfid.tcp.listen-enabled=true
rfid.tcp.listen-port=2000
rfid.tcp.unit-connect-enabled=false
rfid.tcp.unit-targets=169.254.179.2:1000
rfid.tcp.reconnect-delay-ms=5000
rfid.tcp.connect-timeout-ms=8000
rfid.tcp.unit-device-ids=169.254.179.2=1

# RFID cihaz ag taramasi (CH9120 TCP :1000)
device.scan.subnets=169.254.179
device.scan.port=1000
device.scan.timeout-ms=250