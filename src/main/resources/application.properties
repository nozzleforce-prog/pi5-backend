spring.application.name=${SPRING_APPLICATION_NAME:demo}
server.port=${SERVER_PORT:8080}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/ticketdb}
app.allowed.origin=${APP_ALLOWED_ORIGIN:http://localhost:3000}
app.allowed.origins=${APP_ALLOWED_ORIGINS:${app.allowed.origin}}

# JWT: set APP_JWT_SECRET (>=32 chars) in deployment. Empty = ephemeral key (dev only).
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# First ADMIN user when username does not exist yet.
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin}

spring.config.import=optional:classpath:site-config.yml

# Tam akis: RFID + PLC mode/state (GMT: modBilgisi/durumBilgisi) + bilet dusumu
rfid.scan.lookup-only=${RFID_SCAN_LOOKUP_ONLY:false}

plc.enabled=${PLC_ENABLED:true}
plc.ip=${PLC_IP:169.254.179.226}
plc.port=${PLC_PORT:502}
plc.unitId=${PLC_UNIT_ID:1}
# GMT Suite holding registers: modBilgisi=40001, durumBilgisi=40002, alarmDurumu=40003
plc.mode-register=${PLC_MODE_REGISTER:40001}
plc.state-register=${PLC_STATE_REGISTER:40003}
plc.time-register=${PLC_TIME_REGISTER:40002}
plc.alarm-register=${PLC_ALARM_REGISTER:40004}
plc.state-started-bit-value=${PLC_STATE_STARTED_BIT_VALUE:1}
plc.machine-start-timeout-ms=${PLC_MACHINE_START_TIMEOUT_MS:5000}
plc.scan-resume-delay-ms=${PLC_SCAN_RESUME_DELAY_MS:5000}
plc.state-poll-interval-ms=${PLC_STATE_POLL_INTERVAL_MS:200}

# Eszamanli RP2350 (en az 8); TCP backlog + oturum thread havuzu
rfid.max-connections=${RFID_MAX_CONNECTIONS:16}
rfid.max-sessions=${RFID_MAX_SESSIONS:16}

# RFID uc birim TCP (test) — coklu baglanti
# Kart TCP istemci modundaysa backend dinler; TCP sunucu modundaysa unit-targets ile baglanir
rfid.console.print=${RFID_CONSOLE_PRINT:true}
rfid.tcp.listen-enabled=${RFID_TCP_LISTEN_ENABLED:true}
rfid.tcp.listen-port=${RFID_TCP_LISTEN_PORT:2000}
rfid.tcp.unit-connect-enabled=${RFID_TCP_UNIT_CONNECT_ENABLED:false}
rfid.tcp.unit-targets=${RFID_TCP_UNIT_TARGETS:169.254.179.2:1000}
rfid.tcp.reconnect-delay-ms=${RFID_TCP_RECONNECT_DELAY_MS:5000}
rfid.tcp.connect-timeout-ms=${RFID_TCP_CONNECT_TIMEOUT_MS:8000}
rfid.tcp.unit-device-ids=${RFID_TCP_UNIT_DEVICE_IDS:169.254.179.2=1}

# RFID cihaz ag taramasi (CH9120 TCP :1000)
device.scan.subnets=${DEVICE_SCAN_SUBNETS:169.254.179}
device.scan.port=${DEVICE_SCAN_PORT:1000}
device.scan.host-from=${DEVICE_SCAN_HOST_FROM:1}
device.scan.host-to=${DEVICE_SCAN_HOST_TO:254}
device.scan.timeout-ms=${DEVICE_SCAN_TIMEOUT_MS:250}
